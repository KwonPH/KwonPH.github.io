<script>
    console.log("🚀 Directional Drawer v3 LOADED");

    document.addEventListener('DOMContentLoaded', function () {
        const config = {
            topPosition: '1vh',
            slideDistance: 10,      // 위로 숨겨질 거리 (px)
            transitionDuration: '.70s',
            scrollDelta: 5           // 미세한 스크롤 무시 (민감도 조절)
        };

        const logo = document.querySelector('a[href="/"]') || document.querySelector('.navbar-brand');
        const rightMenu = document.querySelector('header .flex.items-center.gap-x-4') || document.querySelector('.flex.items-center');


        // 초기 스타일 설정 (중요: 가급적 CSS보다 여기서 강제하는 것이 정확합니다)
        if (logo) {
            logo.style.position = 'fixed';
            logo.style.left = '50%';
            logo.style.top = config.topPosition;
            logo.style.zIndex = '100';
            logo.style.transition = `transform ${config.transitionDuration} ease-out, opacity ${config.transitionDuration}`;
        }

        if (rightMenu) {
            rightMenu.style.position = 'fixed';
            rightMenu.style.right = '3rem';
            rightMenu.style.top = config.topPosition;
            rightMenu.style.zIndex = '100';
            rightMenu.style.transition = `transform ${config.transitionDuration} ease-out, opacity ${config.transitionDuration}`;
        }

        if (!logo && !rightMenu) return;

        // 초기 상태 설정
        let lastScrollY = window.scrollY;

        [logo, rightMenu].forEach(el => {
            if (el) {
                el.style.position = 'fixed';
                el.style.zIndex = '100';
                el.style.transition = `transform ${config.transitionDuration} ease-out, opacity ${config.transitionDuration}`;
            }
        });

        function updateOnScroll() {
            const currentScrollY = window.scrollY;

            // 1. 최상단에 있을 때는 무조건 보여줌
            if (currentScrollY <= 0) {
                showMenu();
                lastScrollY = currentScrollY;
                return;
            }

            // 2. 스크롤 변화량이 민감도(delta)보다 작으면 무시 (성능 및 떨림 방지)
            if (Math.abs(currentScrollY - lastScrollY) <= config.scrollDelta) return;

            // 3. 방향 판별 및 액션
            if (currentScrollY > lastScrollY) {
                // 아래로 스크롤 중 -> 메뉴 숨기기
                hideMenu();
            } else {
                // 위로 스크롤 중 -> 메뉴 보이기
                showMenu();
            }

            lastScrollY = currentScrollY;
        }

        function showMenu() {
            if (logo) {
                logo.style.transform = `translate(-50%, 0)`;
                logo.style.opacity = '1';
            }
            if (rightMenu) {
                rightMenu.style.transform = `translateY(0)`;
                rightMenu.style.opacity = '1';
            }
        }

        function hideMenu() {
            if (logo) {
                logo.style.transform = `translate(-50%, -${config.slideDistance}px)`;
                logo.style.opacity = '0';
            }
            if (rightMenu) {
                rightMenu.style.transform = `translateY(-${config.slideDistance}px)`;
                rightMenu.style.opacity = '0';
            }
        }

        wwindow.addEventListener('scroll', updateOnScroll, { passive: true });
        // 메뉴 열림/닫힘을 감지하기 위한 감시 (클릭 시에도 반응하도록)
        document.addEventListener('click', () => setTimeout(updateOnScroll, 100));

        updateOnScroll();
    });

</script>
