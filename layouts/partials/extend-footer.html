<script>
    console.log("🚀 Smooth Fade-out Script LOADED");

    document.addEventListener('DOMContentLoaded', function () {
        const hero = document.querySelector('.layout-background');
        if (!hero) return;

        const logo = document.querySelector('.header a[href="/"], .main-menu a[href="/"], .navbar-brand');
        const rightMenu = document.querySelector('header .flex.items-center.gap-x-4, header nav');

        function updateOnScroll() {
            const scrollY = window.scrollY;
            const fadeStart = 80;   // 언제부터 사라지기 시작할지
            const fadeEnd = 280;    // 완전히 사라지는 지점

            let opacity = 1 - (scrollY - fadeStart) / (fadeEnd - fadeStart);
            opacity = Math.max(0, Math.min(1, opacity));   // 0~1 사이로 제한

            if (logo) logo.style.opacity = opacity;
            if (rightMenu) rightMenu.style.opacity = opacity;

            // 완전히 사라지면 pointer-events 제거
            if (opacity < 0.1) {
                if (logo) logo.style.pointerEvents = 'none';
                if (rightMenu) rightMenu.style.pointerEvents = 'none';
            } else {
                if (logo) logo.style.pointerEvents = 'auto';
                if (rightMenu) rightMenu.style.pointerEvents = 'auto';
            }
        }

        window.addEventListener('scroll', updateOnScroll, { passive: true });
        updateOnScroll(); // 초기 실행
    });
</script>
